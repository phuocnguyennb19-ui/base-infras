# ==============================================================================
# NETWORK CONFIGURATION (VPC) - FULL CAPACITY
# ==============================================================================
vpc:
  enabled: true
  name: "prod-core-vpc"
  cidr: "10.0.0.0/16"
  
  # Subnets & AZs
  azs: ["us-east-1a", "us-east-1b", "us-east-1c"]
  public_subnets: ["10.0.1.0/24", "10.0.2.0/24", "10.0.3.0/24"]
  private_subnets: ["10.0.11.0/24", "10.0.12.0/24", "10.0.13.0/24"]
  # database_subnets: ["10.0.21.0/24", "10.0.22.0/24", "10.0.23.0/24"]
  # intra_subnets: ["10.0.31.0/24", "10.0.32.0/24"]
  
  # Gateway settings
  enable_nat_gateway: true
  single_nat_gateway: true    # Tiết kiệm chi phí cho môi trường Dev
  # one_nat_gateway_per_az: false
  # reuse_nat_ips: true
  # external_nat_ip_ids: []

  # DNS Settings
  enable_dns_hostnames: true
  enable_dns_support: true
  # enable_dhcp_options: false
  # dhcp_options_domain_name: "ec2.internal"

  # Security & Flow Logs
  # enable_flow_log: false
  # flow_log_destination_type: "s3"
  # flow_log_destination_arn: "arn:aws:s3:::vpc-flow-logs"
  # flow_log_traffic_type: "ALL"

  # Routes & Peering
  # secondary_cidr_blocks: ["10.1.0.0/16"]
  # enable_vpn_gateway: false
  # propagate_public_route_tables_vgw: false
  # propagate_private_route_tables_vgw: false

  # Tagging Strategy
  tags:
    Layer: "Network"
    Owner: "Platform-Team"
